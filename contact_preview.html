<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — A to Z</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --link: #1a1a1a;
      --link-hover: #4f46e5;
      --max-w: 720px;
      --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; }
    main { flex: 1; padding: 3rem 0 5rem; }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 0;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .nav-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.9rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }

    h1 { font-size: 2rem; font-weight: 800; line-height: 1.25; letter-spacing: -0.02em; }
    p { color: #374151; }
    a { color: var(--link); transition: color 0.15s; }
    a:hover { color: var(--link-hover); }

    .page-header { margin-bottom: 3rem; }
    .page-header h1 { margin-bottom: 0.5rem; }
    .page-header p { color: var(--muted); font-size: 1.05rem; }

    .contact-methods { display: flex; flex-direction: row; gap: 0.75rem; margin-top: 1.5rem; }
    .contact-method { flex: 1; }

    .contact-method {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .contact-method:hover { border-color: #9ca3af; box-shadow: 0 1px 8px rgba(0,0,0,0.05); color: var(--text); }

    .contact-method-icon { font-size: 1.1rem; }

    .contact-method-text strong { display: block; font-size: 0.8rem; color: var(--muted); font-weight: 400; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="nav-brand">A to Z</a>
    <ul class="nav-links">
      <li><a href="#">Blog</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#" class="active">Contact</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="container">
    <div class="page-header">
      <h1>Contact</h1>
      <p>Find me here.</p>
    </div>

    <div class="contact-methods contact-methods--row">
      <a href="#" class="contact-method">
        <span class="contact-method-icon">𝕏</span>
        <div class="contact-method-text">
          @ayytoozee
          <strong>X</strong>
        </div>
      </a>
      <a href="#" class="contact-method">
        <span class="contact-method-icon">⌥</span>
        <div class="contact-method-text">
          github.com/ayy2zee
          <strong>GitHub</strong>
        </div>
      </a>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p>&copy; 2026 A to Z. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
